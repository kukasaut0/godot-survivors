name: Export and Deploy to itch.io

on:
  push:
    branches: [main]

env:
  GODOT_VERSION: "4.6"
  ITCH_TARGET: "kukasaut0/godot-survivors:html5"

jobs:
  export:
    name: Export Web and Deploy
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Install butler
        run: |
          BUTLER_URL=$(curl -fsSL https://api.github.com/repos/itchio/butler/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url')
          curl -fsSL "$BUTLER_URL" -o butler.zip
          unzip butler.zip
          chmod +x linux-amd64/butler

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./linux-amd64/butler push build/web "kukasaut0/godot-survivors:html5"
